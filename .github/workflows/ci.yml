name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Unit + integration tests (node:test) — no database required (fakes/injection).
      - run: npm test

  db-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ivr_pipedrive_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U user -d ivr_pipedrive_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Full suite incl. the DB-store integration tests (TEST_DATABASE_URL set).
      - run: npm test
        env:
          TEST_DATABASE_URL: postgres://user:password@localhost:5432/ivr_pipedrive_test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ivrsolutions-pipedrive:ci .
