name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Unit + integration tests (node:test) — no database required (fakes/injection).
      - run: npm test

  db-tests:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: password
          MARIADB_DATABASE: ivr_pipedrive_test
        ports: ['3306:3306']
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 5s --health-timeout 5s --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Full suite incl. the DB-store integration tests (TEST_DATABASE_URL set).
      # Run once plain and once with the table prefix to cover both code paths.
      - run: npm test
        env:
          TEST_DATABASE_URL: mysql://root:password@127.0.0.1:3306/ivr_pipedrive_test
      - run: npm run test:db
        env:
          TEST_DATABASE_URL: mysql://root:password@127.0.0.1:3306/ivr_pipedrive_test
          TEST_DB_PREFIX: pipedrive_

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ivrsolutions-pipedrive:ci .
