# Local / single-host deployment: MariaDB + the integration backend.
# Secrets come from .env (copy .env.example -> .env); DATABASE_URL is overridden
# here to point at the compose MariaDB service.
services:
  mariadb:
    image: mariadb:10.6
    environment:
      MARIADB_ROOT_PASSWORD: rootpw
      MARIADB_DATABASE: ivr_pipedrive
      MARIADB_USER: user
      MARIADB_PASSWORD: password
    volumes:
      - mariadata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 15

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: mysql://user:password@mariadb:3306/ivr_pipedrive
      DB_TABLE_PREFIX: pipedrive_
      PORT: "3000"
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      mariadb:
        condition: service_healthy
    # Apply the schema, then start the server.
    command: sh -c "node backend/src/db/migrate.js && node backend/src/server.js"

volumes:
  mariadata:
